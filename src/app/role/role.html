<div class="min-vh-100 py-4 px-3 page-bg">
  <div class="mx-auto" style="max-width: 520px">

    <div class="d-flex align-items-center gap-3 mb-4">
      <button class="btn btn-outline-light btn-sm" (click)="goBack()">&#8592; Back</button>
      <h1 class="h4 text-white fw-bold mb-0">{{ title }}</h1>
    </div>

    <div class="card shadow">
      <div class="card-body p-4">

        @if (errorMessage) {
          <div class="alert alert-danger">{{ errorMessage }}</div>
        }

        <form [formGroup]="form" (ngSubmit)="onSave()">

          <div class="mb-3">
            <label for="name" class="form-label fw-semibold">
              Name <span class="text-danger">*</span>
            </label>
            <input
              id="name"
              type="text"
              formControlName="name"
              placeholder="Enter role name"
              class="form-control"
              [class.is-invalid]="form.get('name')!.invalid && form.get('name')!.touched"
            />
            @if (form.get('name')!.invalid && form.get('name')!.touched) {
              <div class="invalid-feedback">Name is required.</div>
            }
            @if (errors['name']) {
              <div class="text-danger small mt-1">{{ errors['name'] }}</div>
            }
          </div>

          <div class="mb-3">
            <label for="description" class="form-label fw-semibold">Description</label>
            <textarea
              id="description"
              formControlName="description"
              rows="3"
              placeholder="Enter role description (optional)"
              class="form-control"
            ></textarea>
            @if (errors['description']) {
              <div class="text-danger small mt-1">{{ errors['description'] }}</div>
            }
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-success" [disabled]="saving || deleting">
              <i class="bi bi-floppy"></i> {{ saving ? 'Saving…' : 'Save' }}
            </button>
            @if (isEditMode) {
              <button type="button" class="btn btn-danger" (click)="onDelete()" [disabled]="saving || deleting">
                <i class="bi bi-trash"></i> {{ deleting ? 'Deleting…' : 'Delete' }}
              </button>
            }
            <button type="button" class="btn btn-secondary" (click)="goBack()" [disabled]="saving || deleting">
              <i class="bi bi-x-circle"></i> Cancel
            </button>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>
