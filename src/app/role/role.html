<div class="page-wrapper">
  <div class="page-container">
    <div class="page-header">
      <button class="btn-back" (click)="goBack()">&#8592; Back</button>
      <h1>{{ title }}</h1>
    </div>

    <div class="card">
      @if (errorMessage) {
        <div class="error-banner">{{ errorMessage }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="onSave()">
        <div class="field">
          <label for="name">Name <span class="required">*</span></label>
          <input
            id="name"
            type="text"
            formControlName="name"
            placeholder="Enter role name"
            [class.invalid]="form.get('name')!.invalid && form.get('name')!.touched"
          />
          @if (form.get('name')!.invalid && form.get('name')!.touched) {
            <span class="field-error">Name is required.</span>
          }
        </div>

        <div class="field">
          <label for="description">Description</label>
          <textarea
            id="description"
            formControlName="description"
            rows="3"
            placeholder="Enter role description (optional)"
          ></textarea>
        </div>

        <div class="actions">
          <button type="submit" class="btn-primary" [disabled]="saving || deleting">
            {{ saving ? 'Saving…' : 'Save' }}
          </button>

          @if (isEditMode) {
            <button type="button" class="btn-danger" (click)="onDelete()" [disabled]="saving || deleting">
              {{ deleting ? 'Deleting…' : 'Delete' }}
            </button>
          }

          <button type="button" class="btn-secondary" (click)="goBack()" [disabled]="saving || deleting">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
