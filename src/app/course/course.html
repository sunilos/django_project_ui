<div class="page-wrapper">
  <div class="page-container">
    <div class="page-header">
      <button class="btn-back" (click)="goBack()">&#8592; Back</button>
      <h1>{{ title }}</h1>
    </div>

    <div class="card">
      @if (loading) {
        <div class="state-box">
          <span class="spinner"></span>
          <p>Loading course...</p>
        </div>
      } @else {
        @if (errorMessage) {
          <div class="error-banner">{{ errorMessage }}</div>
        }

        <form [formGroup]="form" (ngSubmit)="onSave()">
          <div class="field">
            <label for="name">Name <span class="required">*</span></label>
            <input
              id="name"
              type="text"
              formControlName="name"
              placeholder="Enter course name"
              [class.invalid]="form.get('name')!.invalid && form.get('name')!.touched"
            />
            @if (form.get('name')!.invalid && form.get('name')!.touched) {
              <span class="field-error">Name is required.</span>
            }
          </div>

          <div class="field">
            <label for="description">Description</label>
            <input id="description" type="text" formControlName="description" placeholder="Enter description" />
          </div>

          <div class="field">
            <label for="duration">Duration</label>
            <input id="duration" type="text" formControlName="duration" placeholder="e.g. 6 months, 2 years" />
          </div>

          <div class="actions">
            <button type="submit" class="btn btn-success" [disabled]="saving || deleting">
              <i class="bi bi-floppy"></i> {{ saving ? 'Saving…' : 'Save' }}
            </button>

            @if (isEditMode) {
              <button type="button" class="btn btn-danger" (click)="onDelete()" [disabled]="saving || deleting">
                <i class="bi bi-trash"></i> {{ deleting ? 'Deleting…' : 'Delete' }}
              </button>
            }

            <button type="button" class="btn btn-secondary" (click)="goBack()" [disabled]="saving || deleting">
              <i class="bi bi-x-circle"></i> Cancel
            </button>
          </div>
        </form>
      }
    </div>
  </div>
</div>
