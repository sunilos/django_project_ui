<div class="page-wrapper">
  <div class="page-container">
    <div class="page-header">
      <button class="btn-back" (click)="goBack()">&#8592; Back</button>
      <h1>{{ title }}</h1>
    </div>

    <div class="card">
      @if (loading) {
        <div class="state-box">
          <span class="spinner"></span>
          <p>Loading college...</p>
        </div>
      } @else {
        @if (errorMessage) {
          <div class="error-banner">{{ errorMessage }}</div>
        }

        <form [formGroup]="form" (ngSubmit)="onSave()">
          <div class="field">
            <label for="name">Name <span class="required">*</span></label>
            <input
              id="name"
              type="text"
              formControlName="name"
              placeholder="Enter college name"
              [class.invalid]="form.get('name')!.invalid && form.get('name')!.touched"
            />
            @if (form.get('name')!.invalid && form.get('name')!.touched) {
              <span class="field-error">Name is required.</span>
            }
          </div>

          <div class="field">
            <label for="address">Address</label>
            <input id="address" type="text" formControlName="address" placeholder="Enter address" />
          </div>

          <div class="row">
            <div class="field">
              <label for="city">City</label>
              <input id="city" type="text" formControlName="city" placeholder="Enter city" />
            </div>

            <div class="field">
              <label for="state">State</label>
              <input id="state" type="text" formControlName="state" placeholder="Enter state" />
            </div>
          </div>

          <div class="field">
            <label for="phoneNumber">Phone Number</label>
            <input id="phoneNumber" type="tel" formControlName="phoneNumber" placeholder="Enter phone number" />
          </div>

          <div class="actions">
            <button type="submit" class="btn btn-success" [disabled]="saving || deleting">
              <i class="bi bi-floppy"></i> {{ saving ? 'Saving…' : 'Save' }}
            </button>

            @if (isEditMode) {
              <button type="button" class="btn btn-danger" (click)="onDelete()" [disabled]="saving || deleting">
                <i class="bi bi-trash"></i> {{ deleting ? 'Deleting…' : 'Delete' }}
              </button>
            }

            <button type="button" class="btn btn-secondary" (click)="goBack()" [disabled]="saving || deleting">
              <i class="bi bi-x-circle"></i> Cancel
            </button>
          </div>
        </form>
      }
    </div>
  </div>
</div>
