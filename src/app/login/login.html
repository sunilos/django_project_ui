<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <h1>ORS</h1>
      <p>Online Registration System</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      @if (errorMessage) {
        <div class="error-banner">{{ errorMessage }}</div>
      }

      <div class="form-group">
        <label for="login">Login</label>
        <input
          id="login"
          type="text"
          formControlName="login"
          placeholder="Enter your login"
          [class.input-error]="loginForm.get('login')?.invalid && loginForm.get('login')?.touched"
          autocomplete="username"
        />
        @if (loginForm.get('login')?.invalid && loginForm.get('login')?.touched) {
          <span class="field-error">Login is required</span>
        }
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Enter your password"
          [class.input-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          autocomplete="current-password"
        />
        @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
          <span class="field-error">Password is required</span>
        }
      </div>

      <button type="submit" class="btn-login" [disabled]="loading">
        @if (loading) {
          <span class="spinner"></span> Signing in...
        } @else {
          Sign In
        }
      </button>
    </form>
  </div>
</div>
